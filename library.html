<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>UNIVERSAL_LIBRARY | Muhammad Usman</title>
    <style>
        body { background: #fff; color: #4a5d23; font-family: serif; padding: 100px; line-height: 2; overflow-x: hidden; }
        .stream { max-width: 800px; margin: 0 auto; }
        .entry { margin-bottom: 40px; opacity: 0; transform: translateY(20px); transition: 1s; }
        .entry.show { opacity: 1; transform: translateY(0); }
        .nav { position: fixed; top: 20px; left: 20px; color: #4a5d23; text-decoration: none; border-bottom: 1px solid #4a5d23; font-family: sans-serif; }
    </style>
</head>
<body>
    <a href="medical-research.html" class="nav">CLOSE_ARCHIVE</a>
    <div class="stream" id="lib">
        <h1 style="font-style: italic; margin-bottom: 60px;">The Infinite Knowledge Stream</h1>
    </div>
    <script>
        const texts = [
            "Clinical outcome correlation detected in node 0x24F...",
            "Systematic review protocol updated for genomic analysis...",
            "Meta-analytic synthesis suggests breakthrough in bio-tech integration...",
            "Synthesizing universal clinical datasets for diagnostic accuracy...",
            "Knowledge root established at CIMS Multan research kernel...",
            "Evidence levels verified: Grade A clinical significance...",
            "Analyzing multi-center trial data for emerging patterns..."
        ];
        function addEntry() {
            const div = document.createElement('div');
            div.className = 'entry';
            div.innerText = texts[Math.floor(Math.random()*texts.length)];
            document.getElementById('lib').appendChild(div);
            setTimeout(() => div.classList.add('show'), 10);
            if(window.innerHeight + window.scrollY >= document.body.offsetHeight - 500) {
                // Keep the infinite scroll vibe
            }
        }
        setInterval(addEntry, 2000);
        for(let i=0; i<10; i++) addEntry();
        window.onscroll = () => { if((window.innerHeight + window.scrollY) >= document.body.offsetHeight) addEntry(); };
    </script>
</body>
</html>
